name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Overwrite all broken resource files
        run: |
          mkdir -p app/src/main/res/values
          printf '<resources>\n    <style name="Theme.AutovozLoader" />\n</resources>\n' \
            > app/src/main/res/values/themes.xml
          sed -i 's|android:theme="@style/[^"]*"|android:theme="@style/Theme.AutovozLoader"|g' \
            app/src/main/AndroidManifest.xml
          echo "=== themes.xml ===" && cat app/src/main/res/values/themes.xml
          echo "=== Manifest theme ===" && grep "theme" app/src/main/AndroidManifest.xml

      - name: Clean bad dependencies from build.gradle
        run: |
          sed -i '/itextpdf/d' app/build.gradle
          sed -i '/kotlinx-serialization-json/d' app/build.gradle
          sed -i '/appcompat/d' app/build.gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AutovozLoader-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AutovozLoader-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
